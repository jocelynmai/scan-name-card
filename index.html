<!DOCTYPE html>
<html>
<head>
    <title>Công cụ quét Card Visit</title>
</head>
<body>

    <h1>Công cụ quét Card Visit</h1>
    <video id="video" width="640" height="480" autoplay></video>
    <button id="snap">Chụp ảnh</button>
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>

    <script>
        // --- BẠN DÁN CODE JAVASCRIPT VÀO ĐÂY ---
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const snap = document.getElementById('snap');
        const context = canvas.getContext('2d');

        // Yêu cầu quyền truy cập camera
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            navigator.mediaDevices.getUserMedia({ video: true }).then(function(stream) {
                video.srcObject = stream;
                video.play();
            });
        }

        // Chụp ảnh khi nhấn nút
        snap.addEventListener("click", function() {
            console.log("Đã chụp ảnh!");
            context.drawImage(video, 0, 0, 640, 480);
            // Chúng ta sẽ xử lý ảnh này ở các bước sau
        });
    </script>

</body>
</html>
